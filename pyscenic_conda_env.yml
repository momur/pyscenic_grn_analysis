# pySCENIC conda environment
# --------------------------
# Tested on: Linux x86_64, UBC Sockeye HPC (SLURM)
# Python version: 3.7 (required by pySCENIC 0.12.x)
#
# Create environment:
#   conda env create -f pyscenic_conda_env.yml
#
# Activate:
#   conda activate pyscenic_test
#
# Note: the 'prefix' field below is machine-specific — remove or update it
# before sharing or recreating on a different system.

name: pyscenic_test
channels:
  - defaults
dependencies:
  - python=3.7
  - pip
  - pip:
    - pyscenic==0.12.1
    - arboreto==0.1.6
    - ctxcore==0.2.0
    - loompy==2.0.17
    - anndata==0.7.8
    - scanpy==1.9.1
    - numpy==1.21.6
    - pandas==1.3.5
    - scipy==1.7.3
    - scikit-learn==1.0.2
    - numba==0.56.4
    - llvmlite==0.39.1
    - umap-learn==0.5.3
    - dask==2022.2.0
    - distributed==2022.2.0
    - pyarrow==11.0.0
    - h5py==3.8.0
    - networkx==2.6.3
    - tqdm==4.65.0
    - pyyaml==6.0
    - click==8.1.3
    - bokeh==2.4.3
